<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>TŁUMACZ ZEBRAŃ - Wersja Uproszczona</title>
    <style>
        /* Styl dostosowany dla osób 60+ */
        body { font-family: 'Arial', sans-serif; background-color: #ffffff; color: #000000; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #4a235a; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 5px solid #32193d; }
        
        #controls { background-color: #f1f1f1; padding: 25px; display: flex; flex-direction: column; align-items: center; gap: 20px; border-bottom: 2px solid #ccc; }
        
        .big-button { padding: 25px 50px; font-size: 30px; font-weight: bold; border-radius: 20px; border: none; cursor: pointer; width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #start-btn { background-color: #27ae60; color: white; }
        #stop-btn { background-color: #e74c3c; color: white; display: none; }
        
        #slider-container { width: 90%; max-width: 500px; text-align: center; }
        label { font-size: 22px; font-weight: bold; display: block; margin-bottom: 10px; }
        input[type=range] { width: 100%; height: 40px; cursor: pointer; }

        #output { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #ffffff; }
        .entry { margin-bottom: 30px; padding: 20px; border-left: 10px solid #4a235a; background-color: #fafafa; border-radius: 0 15px 15px 0; }
        .pl-text { display: block; line-height: 1.4; color: #000000; margin-bottom: 10px; }
        .nl-text { display: block; font-size: 0.6em; color: #666; font-style: italic; border-top: 1px solid #ddd; padding-top: 5px; }

        .status-msg { font-size: 20px; font-weight: bold; color: #4a235a; }
    </style>
</head>
<body>

<header>TŁUMACZ DLA ZBORU</header>

<div id="controls">
    <div id="status-text" class="status-msg">Kliknij zielony przycisk, aby zacząć</div>
    
    <button id="start-btn" class="big-button" onclick="startApp()">▶ URUCHOM</button>
    <button id="stop-btn" class="big-button" onclick="stopApp()">■ ZATRZYMAJ</button>

    <div id="slider-container">
        <label>WIELKOŚĆ LITER:</label>
        <input type="range" id="fontSize" min="30" max="120" value="50" oninput="changeSize()">
    </div>
</div>

<div id="output" id="chat"></div>

<script>
    // BAZA DANYCH: Księgi Biblijne i Punkty Programu
    const jwBibleMap = {
        "Genesis": "Rodzaju", "Exodus": "Wyjścia", "Leviticus": "Kapłańska", "Numeri": "Liczb", "Deuteronomium": "Powtórzonego Prawa",
        "Jozua": "Jozuego", "Rechters": "Sędziów", "Ruth": "Rut", "Samuel": "Samuela", "Koningen": "Królów", "Kronieken": "Kronik",
        "Ezra": "Ezdrasza", "Nehemia": "Nehemiasza", "Esther": "Estery", "Job": "Hioba", "Psalmen": "Psalmów", "Spreuken": "Przysłów",
        "Prediker": "Kaznodziei", "Hooglied": "Pieśń nad Pieśniami", "Jesaja": "Izajasza", "Jeremia": "Jeremiasza", "Klaagliederen": "Lamentacji",
        "Ezechiël": "Ezechiela", "Daniël": "Daniela", "Hosea": "Ozeasza", "Joël": "Joela", "Amos": "Amosa", "Obadja": "Abdiasza",
        "Jona": "Jonasza", "Micha": "Micheasza", "Nahum": "Nahuma", "Habakuk": "Habakuka", "Zefanja": "Sofoniasza", "Haggaï": "Aggeusza",
        "Zacharia": "Zachariasza", "Maleachi": "Malachiasza", "Mattheüs": "Mateusza", "Markus": "Marka", "Lukas": "Łukasza",
        "Johannes": "Jana", "Handelingen": "Dziejów Apostolskich", "Romeinen": "Rzymian", "Korinthiërs": "Koryntian", "Galaten": "Galatów",
        "Efeziërs": "Efezjan", "Filippenzen": "Filipian", "Kolossenzen": "Kolosan", "Thessalonicenzen": "Tesaloniczan", "Timotheüs": "Tymoteusza",
        "Titus": "Tytusa", "Filemon": "Filemona", "Hebreeën": "Hebrajczyków", "Jakobus": "Jakuba", "Petrus": "Piotra", "Judas": "Judy",
        "Openbaring": "Objawienia",
        // Punkty programu
        "Schatten uit Gods Woord": "Skarby ze Słowa Bożego",
        "Ga op in de velddienst": "Ulepszajmy swoją służbę",
        "Leven als christenen": "Chrześcijańskie życie",
        "Gemeentebijbelstudie": "Zborowe studium Biblii"
    };

    let rec;
    let active = false;

    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.continuous = true;
        rec.interimResults = false;
        rec.lang = 'nl-NL';

        rec.onstart = () => {
            document.getElementById('status-text').innerText = "SŁUCHAM... (Proszę mówić)";
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
        };

        rec.onresult = async (event) => {
            const rawText = event.results[event.results.length - 1][0].transcript;
            
            // Ignoruj dźwięki tła (śmiech, brawa, hałas) - jeśli zdanie jest za krótkie
            if (rawText.trim().split(" ").length < 2) return;

            // Tłumaczenie
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(rawText)}&langpair=nl|pl`);
                const data = await response.json();
                let translated = data.responseData.translatedText;

                // Poprawki teokratyczne (Księgi i punkty)
                Object.keys(jwBibleMap).forEach(nlKey => {
                    const regex = new RegExp(nlKey, "gi");
                    translated = translated.replace(regex, jwBibleMap[nlKey]);
                });

                displayResult(rawText, translated);
            } catch (e) { console.log("Błąd sieci"); }
        };

        rec.onend = () => { if (active) rec.start(); };
    }

    function displayResult(nl, pl) {
        const out = document.getElementById('output');
        const size = document.getElementById('fontSize').value;
        const div = document.createElement('div');
        div.className = 'entry';
        div.style.fontSize = size + "px";
        div.innerHTML = `<span class="pl-text">${pl}</span><span class="nl-text">${nl}</span>`;
        out.prepend(div); // Nowe na górze - wygodniejsze dla seniorów
    }

    function startApp() {
        active = true;
        rec.start();
    }

    function stopApp() {
        active = false;
        rec.stop();
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('status-text').innerText = "Zatrzymano.";
    }

    function changeSize() {
        const size = document.getElementById('fontSize').value;
        const entries = document.querySelectorAll('.entry');
        entries.forEach(e => e.style.fontSize = size + "px");
    }
</script>
</body>
</html>
